<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Certificate and Courses in Nova</title>
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<!-- Favicon-->
	<link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
	<!-- Core theme CSS (includes Bootstrap)-->
	<link rel="stylesheet" href="../css/bootstrap-style.css">
	<link rel="stylesheet" href="../css/style.css">
</head>
<body>
	<!-- Bootstrap core JS-->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

	<script src="../js/navbar.js"></script>
	<custom-navbar></custom-navbar>

	<section id="certificate" class="m-5">
		<h1 class="text-center">Certifications</h1>
		<div class="row gx-4 gx-lg-5">

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="desktop"
					popovertarget="product-popover">
					<div class="card-body">
						<h4 class="card-title text-primary">Nova Certified System Administrator (NCSA)</h4>
						<p class="card-text">
							Validate your skills in managing and maintaining Debian Nova systems. Ideal for sysadmins and IT professionals entering the Linux world.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="desktop"
					popovertarget="product-popover">
					<div class="card-body">
						<h4 class="card-title text-primary">Nova Certified Engineer (NCE)</h4>
						<p class="card-text">
							Advanced certification for engineers who deploy and optimize Debian Nova in production environments, including server, cloud, and container workloads.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="desktop"
					popovertarget="product-popover">
					<div class="card-body">
						<h4 class="card-title text-primary">Nova Certified Security Specialist (NCSS)</h4>
						<p class="card-text">
							Demonstrate expertise in securing Debian Nova systems. Covers hardening, vulnerability management, and enterprise compliance standards. 
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

		</div>
	</section>

	<section id="courses" class="m-5">
		<h1 class="text-center">Courses</h1>
		<div class="row gx-4 gx-lg-5">

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="desktop"
					popovertarget="product-popover">
					<div class="card-body">
						<h4 class="card-title text-primary">Getting Started with Debian Nova</h4>
						<p class="card-text">
							A beginner-friendly course covering installation, basic configuration, and everyday usage of Debian Nova Desktop and Server.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="desktop"
					popovertarget="product-popover">
					<div class="card-body">
						<h4 class="card-title text-primary">Debian Nova for System Administrators</h4>
						<p class="card-text">
							Learn how to manage users, packages, services, and networking on Debian Nova in a real-world enterprise environment.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="desktop"
					popovertarget="product-popover">
					<div class="card-body">
						<h4 class="card-title text-primary">Securing Debian Nova for Enterprise</h4>
						<p class="card-text">
							Hands-on course covering system hardening, firewall configuration, security backports, and compliance best practices.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

		</div>
	</section>

	<div popover="auto" class="mypopover" id="product-popover">
		<div class="d-flex justify-content-end">
			<button class="btn border-0" 
				popovertarget="mypopover" 
				popovertargetaction="hide">
				<h3><i class="bi bi-x-lg"></i></h3>
			</button>
		</div>
		<div class="mx-5 px-5 pb-5">
			<h1 class="my-3" id="product-popover-title"></h1>
			<p class="fs-5" id="product-popover-desc"></p>

			<span>Releases: </span>
			<div class="container text-center">
				<div class="row row-cols-3" id="product-popover-releases"></div>
			</div>
			<div id="product-popover-edition"></div>
			<div id="product-popover-note"></div>
			<button class="container btn bg-crimson text-white btn-switch-receiver mt-5">Download</button>
		</div>
	</div>
	
	<!-- CDN jQuery -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

	<script src="../js/scripts.js"></script>
	<script src="../js/footer.js"></script>
	<custom-footer></custom-footer>
</body>
</html>
