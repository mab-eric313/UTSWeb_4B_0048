<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>All Debian Nova Products</title>
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<!-- Favicon-->
	<link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
	<!-- Core theme CSS (includes Bootstrap)-->
	<link rel="stylesheet" href="../css/bootstrap-style.css">
	<link rel="stylesheet" href="../css/style.css">
</head>
<body>
	<!-- Bootstrap core JS-->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

	<script src="../js/navbar.js"></script>
	<custom-navbar></custom-navbar>
	
	<section id="products" class="m-5">
		<div class="row gx-4 gx-lg-5">

			<h1 class="text-center mb-4">All Products</h1>
			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="desktop"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">Desktop</h2>
						<p class="card-text">
							A modern, stable Linux desktop experience for your team. Designed for productivity with up-to-date software and seamless hardware compatibility out of the box.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="server"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">Server</h2>
						<p class="card-text">
							Run your production workloads with confidence. Debian Nova Server delivers reliability, security patches, and long-term support for your critical infrastructure.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="iot"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">IoT</h2>
						<p class="card-text">
							A lightweight and secure foundation for edge devices and embedded systems. Optimized for low-resource environments without compromising stability.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="container"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">Container</h2>
						<p class="card-text">
							Minimal, secure container images ready for Docker and Kubernetes. Build and deploy faster with a trusted Debian-based foundation.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="virtualization"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">Virtualization</h2>
						<p class="card-text">
							Optimized for virtual environments and hypervisors. Run Debian Nova as a guest or host with full support for KVM, VMware, and VirtualBox.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="wsl"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">WSL</h2>
						<p class="card-text">
							Run Debian Nova natively inside Windows with WSL. Get a full Linux environment without dual boot, perfect for developers on Windows machines.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="azure"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">Azure</h2>
						<p class="card-text">
							Deploy Debian Nova on Microsoft Azure with ease. Pre-configured images ready for cloud workloads, scalable and fully supported in the Azure Marketplace.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="aws"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">AWS</h2>
						<p class="card-text">
							Launch Debian Nova on Amazon Web Services in minutes. Optimized AMI images for EC2 instances, designed for performance, security, and cost efficiency in the cloud.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

			<div class="col-md-4 mb-5">
				<button class="card h-100 w-100 text-start card-button" 
					data-product="ai"
					popovertarget="product-popover">
					<div class="card-body">
						<h2 class="card-title text-primary">AI</h2>
						<p class="card-text">
							A ready-to-use Linux environment for AI and machine learning workloads. Pre-configured with GPU support and popular AI frameworks out of the box.
						</p>
					</div>
					<div class="card-footer bg-transparent border border-0 text-end text-primary">
						<h5><i class="bi bi-arrow-right"></i></h5>
					</div>
				</button>
			</div>

		</div>
	</section>

	<div popover="auto" class="mypopover" id="product-popover">
		<div class="d-flex justify-content-end">
			<button class="btn border-0" 
				popovertarget="mypopover" 
				popovertargetaction="hide">
				<h3><i class="bi bi-x-lg"></i></h3>
			</button>
		</div>
		<div class="mx-5 px-5 pb-5">
			<h1 class="my-3" id="product-popover-title"></h1>
			<p class="fs-5" id="product-popover-desc"></p>

			<span>Releases: </span>
			<div class="container text-center">
				<div class="row row-cols-3" id="product-popover-releases"></div>
			</div>
			<div id="product-popover-edition"></div>
			<div id="product-popover-note"></div>
			<button class="container btn bg-crimson text-white btn-switch-receiver mt-5" id="product-popover-button">Download</button>
		</div>
	</div>

	<!-- CDN jQuery -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

	<script src="../js/scripts.js"></script>
	<script src="../js/footer.js"></script>
	<custom-footer></custom-footer>
</body>
</html>
